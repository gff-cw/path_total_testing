name: random-polarafl-opener
run-name: polarafl opener fuzzing [${{ inputs.run_segment }}/${{ inputs.max_segments }}] on ${{ inputs.target_branch }}

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to fuzz'
        required: true
        default: 'main'
        type: string
      run_segment:
        description: 'Current fuzzing segment number'
        required: true
        default: '1'
        type: string
      max_segments:
        description: 'Maximum number of chained fuzzing segments'
        required: true
        default: '8'
        type: string
      resume_run_id:
        description: 'Previous workflow run ID used for AFL resume'
        required: false
        default: ''
        type: string
      resume_artifact_name:
        description: 'Artifact name that contains previous AFL outputs'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  actions: write

jobs:
  fuzzing:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Install runtime libraries for target
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3.12 \
            libpython3.12t64 \
            libstdc++6 \
            libgcc-s1 \
            libcjson1
          sudo ldconfig

      - name: Restore AFL state from previous segment
        if: ${{ inputs.resume_run_id != '' && inputs.resume_artifact_name != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cd Polar
          rm -rf outputs
          mkdir -p /tmp/afl-resume
          gh run download "${{ inputs.resume_run_id }}" \
            -n "${{ inputs.resume_artifact_name }}" \
            -D /tmp/afl-resume
          tar -xzf /tmp/afl-resume/opener-findings.tar.gz
          test -d outputs/out_s0/queue
          echo "Resumed AFL output from run ${{ inputs.resume_run_id }} / artifact ${{ inputs.resume_artifact_name }}"

      - name: Prepare runner for crash detection
        shell: bash
        run: |
          echo "Before: $(cat /proc/sys/kernel/core_pattern)"
          sudo sysctl -w kernel.core_pattern=core
          echo "After:  $(cat /proc/sys/kernel/core_pattern)"

      - name: Run AFL fuzzing with 4 secondary instances
        shell: bash
        run: |
          cd Polar
          chmod +x ./opener_polar ./afl-fuzz

          if [ -d outputs/out_s0/queue ]; then
            input_args=(-i-)
            echo "Resume mode: use existing outputs"
          else
            rm -rf outputs
            input_args=(-i ../random/opener)
            echo "Fresh mode: use inputs/ as initial corpus"
          fi

          pids=()

          set +e

          timeout 21300 ./afl-fuzz \
            "${input_args[@]}" \
            -o outputs \
            -S out_s0 \
            -m none \
            -- ./opener_polar @@ >/dev/null 2>&1 &
          pids+=($!)

          sleep 2

          for i in 1 2 3; do
            timeout 21300 ./afl-fuzz \
              "${input_args[@]}" \
              -o outputs \
              -S "out_s${i}" \
              -m none \
              -- ./opener_polar @@ >/dev/null 2>&1 &
            pids+=($!)
          done

          rc=0
          for pid in "${pids[@]}"; do
            wait "$pid"
            one_rc=$?
            echo "worker pid=$pid exit code=$one_rc"
            if [ "$one_rc" -ne 0 ] && [ "$one_rc" -ne 124 ]; then
              rc="$one_rc"
            fi
          done

          set -e
          exit "$rc"

      - name: Print final fuzzer_stats for all workers
        if: always()
        shell: bash
        run: |
          cd Polar
          echo "===== final fuzzer_stats for all workers ====="
          found=0
          shopt -s nullglob
          for stats in outputs/out_*/fuzzer_stats; do
            found=1
            worker_dir="$(dirname "$stats")"
            worker_name="$(basename "$worker_dir")"
            echo "===== ${worker_name} ====="
            cat "$stats"
            echo
          done
          if [ "$found" -eq 0 ]; then
            echo "No outputs/out_*/fuzzer_stats found"
          fi

      - name: Pack fuzzing results
        if: always()
        shell: bash
        run: |
          cd Polar
          if [ -d outputs ]; then
            tar -czf opener-findings.tar.gz outputs
          else
            echo "outputs not found, skip packing"
          fi

      - name: Upload fuzzing results archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opener-findings-seg-${{ inputs.run_segment }}
          path: Polar/opener-findings.tar.gz
          if-no-files-found: warn

      - name: Trigger next fuzzing segment
        if: ${{ success() && fromJSON(inputs.run_segment) < fromJSON(inputs.max_segments) }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          next_segment=$(( ${{ inputs.run_segment }} + 1 ))
          current_artifact="opener-findings-seg-${{ inputs.run_segment }}"

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/random_polarafl_opener.yml/dispatches" \
            -d @- <<EOF
          {
            "ref": "main",
            "inputs": {
              "target_branch": "${{ inputs.target_branch }}",
              "run_segment": "${next_segment}",
              "max_segments": "${{ inputs.max_segments }}",
              "resume_run_id": "${{ github.run_id }}",
              "resume_artifact_name": "${current_artifact}"
            }
          }
          EOF
